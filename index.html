<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechPrice Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>TechPrice Tracker</h1>
<p>As melhores promoções de informática e gamer.</p>

<input type="text" id="search" placeholder="Pesquisar produto...">
</header>

<section class="products" id="products">

<div class="card">
<h2>Mouse Logitech G305</h2>
<p>R$ 189,90</p>
<button>Ver Oferta</button>
</div>

<div class="card">
<h2>SSD Kingston 1TB</h2>
<p>R$ 349,90</p>
<button>Ver Oferta</button>
</div>

<div class="card">
<h2>Teclado Redragon Kumara</h2>
<p>R$ 169,90</p>
<button>Ver Oferta</button>
</div>

</section>

<script src="script.js"></script>
</body>
</html>
